name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ matrix.python }}
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Cache torchvision ImageNet weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: resnet50-imagenet-v1
      - name: Warm torchvision weights cache
        run: uv run python -c "from torchvision.models import resnet50, ResNet50_Weights; resnet50(weights=ResNet50_Weights.IMAGENET1K_V1)"
      - name: Pytest (fast tier)
        run: uv run pytest -m "not slow and not e2e and not gpu"
      - name: Pytest (slow tier + coverage gate)
        run: uv run pytest -m "slow" --cov-append --cov-fail-under=80 --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Cache torchvision ImageNet weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: resnet50-imagenet-v1
      - name: Pytest (e2e)
        run: uv run pytest -m "e2e" --timeout=300

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Build
        run: uv build
