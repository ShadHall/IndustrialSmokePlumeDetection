# Paper-replication config for classification (Mommert et al. 2020, 4-channel).
# Hyperparameters copied from the original argparse defaults in the pre-Lightning
# HSG-AIML repo (commit 64c806b, src/smoke_detection/classification/train.py).
# Use this config to verify Table 1 parity post-Lightning port; use default.yaml
# for normal development runs (much more conservative LR).

task: classification
seed: 42
trainer:
  max_epochs: 100
  accelerator: auto
  devices: auto
  precision: "32"
  deterministic: true
  log_every_n_steps: 10
paths:
  data_root: data
  output_dir: lightning_logs
  experiment_name: classification_4ch_resnet50_paper
optim:
  lr: 0.3
  momentum: 0.7
  weight_decay: 0.0
  scheduler: plateau
model:
  backbone: resnet50
  pretrained: true
  in_channels: 4
data:
  batch_size: 30
  num_workers: 4
  crop_size: 90
  balance: upsample
